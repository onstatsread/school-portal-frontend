<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; }

    .topbar { background: linear-gradient(135deg, #b71c1c, #c62828); color: #fff;
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 18px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }

    .tab-content { padding: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 16px; }
    .card h3 { font-size: 15px; margin-bottom: 14px; color: #b71c1c; }

    .child-card { border: 1.5px solid #ffcdd2; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; cursor: pointer; transition: background 0.2s; }
    .child-card:hover { background: #fff8f8; }
    .child-card h4 { color: #b71c1c; font-size: 14px; margin-bottom: 4px; }
    .child-card p { font-size: 12px; color: #888; }

    select, input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 10px; background: #fafafa; }
    .btn { background: linear-gradient(135deg, #b71c1c, #c62828); color: #fff; border: none;
      padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; width: 100%; margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; background: #ffebee; color: #b71c1c; font-weight: 600; }
    td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }

    .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.present { background: #e8f5e9; color: #2e7d32; }
    .badge.absent  { background: #ffebee; color: #c62828; }
    .badge.late    { background: #fff8e1; color: #f57f17; }
  </style>
</head>
<body>
  <div class="topbar">
    <div><h1>👨‍👧 Parent Portal</h1><span id="parentName" style="font-size:13px;opacity:.85"></span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="tab-content">
    <div class="card">
      <h3>My Children</h3>
      <div id="childrenList">Loading…</div>
    </div>

    <div class="card" id="childDetail" style="display:none">
      <h3 id="childDetailName">Child Details</h3>

      <p style="font-size:13px;font-weight:600;color:#b71c1c;margin-bottom:10px">Attendance</p>
      <div id="childAttendance">Loading…</div>

      <p style="font-size:13px;font-weight:600;color:#b71c1c;margin:16px 0 10px">Results</p>
      <select id="par-term">
        <option value="First">First Term</option>
        <option value="Second">Second Term</option>
        <option value="Third">Third Term</option>
      </select>
      <input type="text" id="par-session" placeholder="Session e.g. 2024/2025" />
      <button class="btn" onclick="loadChildGrades()">Load Results</button>
      <div id="childGrades" style="margin-top:14px"></div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    let selectedStudentId = null;

    window.onload = async () => {
      if (!requireAuth("parent")) return;
      document.getElementById("parentName").textContent = "Welcome, " + getFullName();
      await loadChildren();
    };

    async function loadChildren() {
      const res = await apiFetch("/portal/parent/children");
      if (!res || !res.ok) return;
      const data = await res.json();
      const el = document.getElementById("childrenList");
      if (!data.length) {
        el.innerHTML = "<p style='color:#888;font-size:13px'>No children linked yet. Contact admin.</p>";
        return;
      }
      el.innerHTML = data.map(c => `
        <div class="child-card" onclick="selectChild(${c.student_id}, '${c.full_name}')">
          <h4>${c.full_name}</h4>
          <p>Admission: ${c.admission_number} &bull; Class: ${c.class}</p>
        </div>
      `).join("");
    }

    async function selectChild(studentId, name) {
      selectedStudentId = studentId;
      document.getElementById("childDetail").style.display = "block";
      document.getElementById("childDetailName").textContent = name + " — Details";

      const res = await apiFetch(`/portal/attendance/student/${studentId}`);
      if (!res || !res.ok) return;
      const d = await res.json();
      const s = d.summary;

      document.getElementById("childAttendance").innerHTML = `
        <p style="font-size:13px;margin-bottom:8px">
          Rate: <strong>${s.attendance_rate}%</strong> &bull;
          Present: <strong style="color:#2e7d32">${s.present}</strong> &bull;
          Absent: <strong style="color:#c62828">${s.absent}</strong> &bull;
          Late: <strong style="color:#f57f17">${s.late}</strong>
        </p>
        <table>
          <thead><tr><th>Date</th><th>Status</th></tr></thead>
          <tbody>
            ${d.records.slice(0, 20).map(r => `
              <tr>
                <td>${formatDate(r.date)}</td>
                <td><span class="badge ${r.status}">${r.status}</span></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
      document.getElementById("childDetail").scrollIntoView({ behavior: "smooth" });
    }

    async function loadChildGrades() {
      if (!selectedStudentId) return;
      const term    = document.getElementById("par-term").value;
      const session = document.getElementById("par-session").value.trim();
      if (!session) { alert("Enter the session e.g. 2024/2025"); return; }

      const res = await apiFetch(
        `/portal/grades/student/${selectedStudentId}?term=${term}&session=${encodeURIComponent(session)}`
      );
      if (!res || !res.ok) return;
      const d = await res.json();

      if (!d.grades.length) {
        document.getElementById("childGrades").innerHTML =
          "<p style='color:#888;font-size:13px'>No results found for this term/session.</p>";
        return;
      }

      document.getElementById("childGrades").innerHTML = `
        <table>
          <thead><tr><th>Subject</th><th>CA</th><th>Exam</th><th>Total</th><th>Grade</th></tr></thead>
          <tbody>
            ${d.grades.map(g => `
              <tr>
                <td>${g.subject}</td>
                <td>${g.ca_score}</td>
                <td>${g.exam_score}</td>
                <td>${g.total}</td>
                <td><strong>${g.grade}</strong></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        <p style="margin-top:10px;font-size:13px;color:#b71c1c;font-weight:600">
          Average: ${d.summary.average}% across ${d.summary.subjects} subjects
        </p>
      `;
    }
  </script>
</body>
</html>
