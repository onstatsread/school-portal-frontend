<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; }
    .topbar { background: linear-gradient(135deg, #4a148c, #7b1fa2); color: #fff;
      padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 18px; }
    .logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff;
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .nav-tabs { display: flex; background: #fff; border-bottom: 2px solid #e0e0e0;
      overflow-x: auto; padding: 0 16px; }
    .nav-tab { padding: 12px 18px; cursor: pointer; font-size: 14px; font-weight: 500;
      color: #666; border-bottom: 3px solid transparent; white-space: nowrap; }
    .nav-tab.active { color: #7b1fa2; border-bottom-color: #7b1fa2; }
    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }
    .card { background: #fff; border-radius: 12px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 16px; }
    .card h3 { font-size: 15px; margin-bottom: 14px; color: #4a148c; }
    select, input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; margin-bottom: 10px; background: #fafafa; }
    .btn { background: linear-gradient(135deg, #4a148c, #7b1fa2); color: #fff; border: none;
      padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; width: 100%; margin-top: 4px; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; background: #f3e5f5; color: #4a148c; font-weight: 600; }
    td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
    .class-card { border: 1.5px solid #e1bee7; border-radius: 10px; padding: 14px;
      margin-bottom: 10px; }
    .class-card h4 { color: #4a148c; font-size: 14px; margin-bottom: 4px; }
    .class-card p { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>👩‍🏫 Teacher Portal</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-btn-myclasses" onclick="switchTab('myclasses')">My Classes</div>
    <div class="nav-tab" id="tab-btn-attendance" onclick="switchTab('attendance')">Mark Attendance</div>
    <div class="nav-tab" id="tab-btn-grades" onclick="switchTab('grades')">Enter Grades</div>
  </div>

  <!-- MY CLASSES -->
  <div class="tab-content active" id="tab-myclasses">
    <div class="card">
      <h3>My Assigned Classes & Subjects</h3>
      <div id="myClassesList">Loading…</div>
    </div>
  </div>

  <!-- MARK ATTENDANCE -->
  <div class="tab-content" id="tab-attendance">
    <div class="card">
      <h3>Mark Attendance</h3>
      <select id="att-class"><option value="">— Select class —</option></select>
      <input type="date" id="att-date" />
      <button class="btn" onclick="loadStudentsForAttendance()">Load Students</button>
    </div>
    <div class="card" id="att-form-card" style="display:none">
      <h3 id="att-form-title">Attendance Sheet</h3>
      <table>
        <thead><tr><th>Adm. No.</th><th>Name</th><th>Status</th></tr></thead>
        <tbody id="att-students"></tbody>
      </table>
      <button class="btn" style="margin-top:14px" onclick="submitAttendance()">Submit Attendance</button>
      <div class="msg" id="att-msg"></div>
    </div>
  </div>

  <!-- ENTER GRADES -->
  <div class="tab-content" id="tab-grades">
    <div class="card">
      <h3>Select Class & Subject</h3>
      <select id="gr-class"><option value="">— Select class —</option></select>
      <select id="gr-subject"><option value="">— Select subject —</option></select>
      <select id="gr-term">
        <option value="First">First Term</option>
        <option value="Second">Second Term</option>
        <option value="Third">Third Term</option>
      </select>
      <input type="text" id="gr-session" placeholder="Session e.g. 2024/2025" />
      <button class="btn" onclick="loadStudentsForGrades()">Load Students</button>
    </div>
    <div class="card" id="gr-form-card" style="display:none">
      <h3>Enter Scores (CA max 40 | Exam max 60)</h3>
      <table>
        <thead><tr><th>Adm. No.</th><th>Name</th><th>CA</th><th>Exam</th><th>Total</th></tr></thead>
        <tbody id="gr-students"></tbody>
      </table>
      <button class="btn" style="margin-top:14px" onclick="submitGrades()">Save Grades</button>
      <div class="msg" id="gr-msg"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://school-portal-api-55v4.onrender.com";
    let myAssignments = [];
    let gradeData = [];

    function getToken() { return localStorage.getItem("token"); }

    function logout() {
      localStorage.clear();
      window.location.href = "../index.html";
    }

    async function apiFetch(path, options = {}) {
      const token = getToken();
      if (!token) { window.location.href = "../index.html"; return null; }
      try {
        const res = await fetch(API_BASE + path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token,
            ...(options.headers || {})
          }
        });
        if (res.status === 401) { logout(); return null; }
        return res;
      } catch (e) {
        console.error("API error:", e);
        return null;
      }
    }

    function showMsg(elId, msg, isError = false) {
      const el = document.getElementById(elId);
      if (!el) return;
      el.textContent = msg;
      el.style.display = "block";
      el.style.background = isError ? "#ffebee" : "#e8f5e9";
      el.style.color = isError ? "#c62828" : "#2e7d32";
      el.style.border = isError ? "1px solid #ef9a9a" : "1px solid #a5d6a7";
      el.style.borderRadius = "8px";
      el.style.padding = "10px 14px";
    }

    function switchTab(name) {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
      document.getElementById("tab-" + name).classList.add("active");
      document.getElementById("tab-btn-" + name).classList.add("active");
      if (name === "grades") loadSubjectsForGrades();
    }

    window.onload = async () => {
      const token = getToken();
      if (!token) { window.location.href = "../index.html"; return; }
      await loadMyClasses();
    };

    async function loadMyClasses() {
      const res = await apiFetch("/portal/teacher/my-classes");
      if (!res) {
        document.getElementById("myClassesList").textContent = "Failed to load. Check connection.";
        return;
      }
      if (!res.ok) {
        const d = await res.json();
        document.getElementById("myClassesList").textContent = d.detail || "Error loading classes.";
        return;
      }
      const data = await res.json();
      myAssignments = data;

      if (!data.length) {
        document.getElementById("myClassesList").innerHTML =
          "<p style='color:#888;font-size:13px'>No classes assigned yet. Ask admin to assign you to a class and subject.</p>";
        return;
      }

      document.getElementById("myClassesList").innerHTML = data.map(a => `
        <div class="class-card">
          <h4>${a.class_name}</h4>
          <p>${a.subject_name} &bull; ${a.student_count} students</p>
        </div>
      `).join("");

      // Populate class dropdowns
      const attSel = document.getElementById("att-class");
      const grSel = document.getElementById("gr-class");
      const seen = new Set();
      data.forEach(a => {
        if (!seen.has(a.class_id)) {
          seen.add(a.class_id);
          [attSel, grSel].forEach(s => {
            const opt = document.createElement("option");
            opt.value = a.class_id;
            opt.textContent = a.class_name;
            s.appendChild(opt);
          });
        }
      });
    }

    async function loadSubjectsForGrades() {
      const res = await apiFetch("/admin/subjects");
      if (!res || !res.ok) return;
      const data = await res.json();
      const sel = document.getElementById("gr-subject");
      sel.innerHTML = "<option value=''>— Select subject —</option>";
      data.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = s.name + " (" + s.code + ")";
        sel.appendChild(opt);
      });
    }

    async function loadStudentsForAttendance() {
      const classId = document.getElementById("att-class").value;
      const date = document.getElementById("att-date").value;
      if (!classId || !date) { alert("Select a class and date."); return; }

      const res = await apiFetch("/portal/grades/class/" + classId + "?subject_id=1&term=First&session=2024/2025");
      if (!res || !res.ok) {
        alert("Failed to load students.");
        return;
      }
      const data = await res.json();
      document.getElementById("att-form-card").style.display = "block";
      document.getElementById("att-form-title").textContent = "Attendance — " + date;

      const tbody = document.getElementById("att-students");
      tbody.innerHTML = data.map(s => `
        <tr>
          <td>${s.admission_number}</td>
          <td>${s.full_name}</td>
          <td>
            <select id="att-status-${s.student_id}" style="width:100px;margin:0;padding:4px">
              <option value="present">Present</option>
              <option value="absent">Absent</option>
              <option value="late">Late</option>
            </select>
          </td>
        </tr>
      `).join("");

      window._attStudents = data;
      window._attDate = date;
      window._attClassId = classId;
    }

    async function submitAttendance() {
      const students = window._attStudents || [];
      const date = window._attDate;
      const classId = window._attClassId;

      const records = students.map(s => ({
        student_id: s.student_id,
        status: document.getElementById("att-status-" + s.student_id).value
      }));

      const res = await apiFetch("/portal/attendance/bulk", {
        method: "POST",
        body: JSON.stringify({ date, class_id: parseInt(classId), records })
      });

      if (!res || !res.ok) { showMsg("att-msg", "Failed to save attendance.", true); return; }
      const d = await res.json();
      showMsg("att-msg", d.message || "Attendance saved!");
    }

    async function loadStudentsForGrades() {
      const classId = document.getElementById("gr-class").value;
      const subjectId = document.getElementById("gr-subject").value;
      const term = document.getElementById("gr-term").value;
      const session = document.getElementById("gr-session").value.trim();
      if (!classId || !subjectId || !session) { alert("Fill all fields."); return; }

      const res = await apiFetch(
        "/portal/grades/class/" + classId + "?subject_id=" + subjectId +
        "&term=" + term + "&session=" + encodeURIComponent(session)
      );
      if (!res || !res.ok) { alert("Failed to load students."); return; }
      const data = await res.json();
      gradeData = data;

      document.getElementById("gr-form-card").style.display = "block";
      const tbody = document.getElementById("gr-students");
      tbody.innerHTML = data.map(s => `
        <tr>
          <td>${s.admission_number}</td>
          <td>${s.full_name}</td>
          <td><input type="number" min="0" max="40" step="0.5" value="${s.ca_score ?? ''}"
               id="ca-${s.student_id}" style="width:60px;margin:0;padding:4px"
               oninput="calcTotal(${s.student_id})" /></td>
          <td><input type="number" min="0" max="60" step="0.5" value="${s.exam_score ?? ''}"
               id="ex-${s.student_id}" style="width:60px;margin:0;padding:4px"
               oninput="calcTotal(${s.student_id})" /></td>
          <td id="total-${s.student_id}">${s.total ?? '—'}</td>
        </tr>
      `).join("");
    }

    function calcTotal(studentId) {
      const ca = parseFloat(document.getElementById("ca-" + studentId).value) || 0;
      const ex = parseFloat(document.getElementById("ex-" + studentId).value) || 0;
      document.getElementById("total-" + studentId).textContent = (ca + ex).toFixed(1);
    }

    async function submitGrades() {
      const subjectId = parseInt(document.getElementById("gr-subject").value);
      const term = document.getElementById("gr-term").value;
      const session = document.getElementById("gr-session").value.trim();
      let successCount = 0;

      for (const s of gradeData) {
        const ca = parseFloat(document.getElementById("ca-" + s.student_id).value);
        const exam = parseFloat(document.getElementById("ex-" + s.student_id).value);
        if (isNaN(ca) || isNaN(exam)) continue;
        const res = await apiFetch("/portal/grades/enter", {
          method: "POST",
          body: JSON.stringify({
            student_id: s.student_id, subject_id: subjectId,
            term, session, ca_score: ca, exam_score: exam
          })
        });
        if (res && res.ok) successCount++;
      }
      showMsg("gr-msg", successCount + " grades saved successfully!");
    }
  </script>
</body>
</html>
