<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>School Portal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1a237e, #1565c0);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a237e;
    }

    .logo p {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #222;
      background: #fafafa;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input:focus {
      outline: none;
      border-color: #1565c0;
      background: #fff;
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a237e, #1565c0);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef9a9a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .error.show { display: block; }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🏫</div>
      <h1>School Portal</h1>
      <p>Sign in to your account</p>
    </div>

    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="error" id="errorBox"></div>

    <div class="footer">School Management System &copy; 2025</div>
  </div>

  <script>
    // ── Config ────────────────────────────────────────────────
    const API_BASE = "https://school-portal-api-55v4.onrender.com"; // ← Change this after deployment

    // ── Role → dashboard page ─────────────────────────────────
    const DASHBOARDS = {
      admin:   "dashboard/admin.html",
      teacher: "dashboard/teacher.html",
      student: "dashboard/student.html",
      parent:  "dashboard/parent.html"
    };

    // Auto redirect if already logged in
    window.onload = () => {
      const token = localStorage.getItem("token");
      const role  = localStorage.getItem("role");
      if (token && role && DASHBOARDS[role]) {
        window.location.href = DASHBOARDS[role];
      }

      // Allow Enter key to submit
      document.getElementById("password").addEventListener("keydown", e => {
        if (e.key === "Enter") doLogin();
      });
    };

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("loginBtn");
      const errorBox = document.getElementById("errorBox");

      errorBox.classList.remove("show");

      if (!username || !password) {
        showError("Please enter your username and password.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || "Login failed. Check your credentials.");
          return;
        }

        // Save auth data
        localStorage.setItem("token",     data.access_token);
        localStorage.setItem("role",      data.role);
        localStorage.setItem("full_name", data.full_name);
        localStorage.setItem("user_id",   data.user_id);

        // Redirect to role dashboard
        const dest = DASHBOARDS[data.role];
        if (dest) {
          window.location.href = dest;
        } else {
          showError("Unknown role. Contact your administrator.");
        }

      } catch (err) {
        showError("Cannot reach server. Check your connection.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent = msg;
      box.classList.add("show");
    }
  </script>
</body>
</html>
